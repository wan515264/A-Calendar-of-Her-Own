<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#3B1027" />
    <meta name="description" content="A Calendar of Her Own｜她自己的日历" />
    <title>A Calendar of Her Own｜她自己的日历</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script type="module">
      const repoBase = "/A-Calendar-of-Her-Own/";
      const isLocalDev = ["localhost", "127.0.0.1", ""].includes(window.location.hostname);
      const hasBuiltEntry = Array.from(document.scripts).some((script) =>
        script.src.includes(`${repoBase}assets/index.js`)
      );

      if (!isLocalDev && !hasBuiltEntry) {
        const cacheBuster = Date.now();
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.crossOrigin = "";
        stylesheet.href = `${repoBase}assets/index.css?v=${cacheBuster}`;
        document.head.appendChild(stylesheet);

        const manifest = document.createElement("link");
        manifest.rel = "manifest";
        manifest.href = `${repoBase}manifest.webmanifest`;
        document.head.appendChild(manifest);

        const appScript = document.createElement("script");
        appScript.type = "module";
        appScript.crossOrigin = "";
        appScript.src = `${repoBase}assets/index.js?v=${cacheBuster}`;
        document.body.appendChild(appScript);
      }
    </script>
  </body>
</html>
